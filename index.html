<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Cricket Club — 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.container { max-width: 480px; width: 100%; }
.logo { text-align: center; margin-bottom: 2.5rem; }
.logo h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
.logo p { font-size: 14px; color: #888; margin-top: 6px; }
.cards { display: flex; flex-direction: column; gap: 14px; }
.card { display: block; text-decoration: none; border-radius: 12px; padding: 1.25rem 1.5rem; border: 0.5px solid #ddd; background: #fff; transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; }
.card:active { transform: scale(0.98); }
.card-top { display: flex; align-items: center; gap: 14px; }
.badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.badge-lions { background: #E6F1FB; }
.badge-tigers { background: #FAEEDA; }
.card-info h2 { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.card-info p { font-size: 13px; color: #888; margin-top: 3px; }
.card-lions { border-left: 3px solid #185FA5; }
.card-tigers { border-left: 3px solid #993C1D; }
.arrow { margin-left: auto; font-size: 18px; color: #ccc; }
.footer { text-align: center; margin-top: 2rem; font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🏏 Madison Cricket Club</h1>
    <p>Tape T20 2026 — Availability Trackers</p>
  </div>
  <div class="cards">
    <a class="card card-lions" href="lions.html">
      <div class="card-top">
        <div class="badge badge-lions">🦁</div>
        <div class="card-info">
          <h2>Madison Lions</h2>
          <p>Availability &amp; selection tracker</p>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
    <a class="card card-tigers" href="tigers.html">
      <div class="card-top">
        <div class="badge badge-tigers">🐯</div>
        <div class="card-info">
          <h2>Madison Tigers</h2>
          <p>Availability &amp; selection tracker</p>
        </div>
        <div class="arrow">›</div>
      </div>
    </a>
  </div>
  <div class="footer">Madison Cricket Club · 2026</div>
</div>
</body>
</html>
