<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Cricket Club — 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

.hero {
  background: linear-gradient(150deg, #1A56B0 0%, #0C3A7A 100%);
  padding: 2.5rem 1.5rem 4rem;
  text-align: center;
}
.hero-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.15); font-size: 32px; margin-bottom: 12px;
}
.hero h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.hero p { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 5px; }

.content { padding: 0 1rem 2rem; max-width: 500px; margin: -2rem auto 0; }

.tournament-tile {
  display: flex; align-items: center; gap: 16px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  padding: 20px;
  text-decoration: none; color: #111827;
  margin-bottom: 1rem;
  transition: background 0.12s;
}
.tournament-tile:active { background: #F9FAFB; }

.tile-icon {
  width: 54px; height: 54px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.tile-tape    { background: #E8F1FC; }
.tile-leather { background: #FEE2E2; }

.tile-body { flex: 1; }
.tile-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
.title-tape    { color: #1A56B0; }
.title-leather { color: #9B1C1C; }
.tile-sub  { font-size: 12px; color: #6B7280; margin-top: 4px; }
.tile-desc { font-size: 12px; color: #9CA3AF; margin-top: 5px; }

.tile-arrow { font-size: 26px; color: #D1D5DB; font-weight: 300; flex-shrink: 0; }

.footer { text-align: center; padding: 0.5rem 1rem 2rem; font-size: 12px; color: #9CA3AF; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🏏</div>
  <h1>Madison Cricket Club</h1>
  <p>2026 Season</p>
</div>

<div class="content">

  <a class="tournament-tile" href="tape-t20.html">
    <div class="tile-icon tile-tape">🏏</div>
    <div class="tile-body">
      <div class="tile-title title-tape">Tape T-20</div>
      <div class="tile-sub">Lions &amp; Tigers · 2026 Season</div>
      <div class="tile-desc">Availability, stats &amp; schedules</div>
    </div>
    <span class="tile-arrow">›</span>
  </a>

  <a class="tournament-tile" href="leather-t30.html">
    <div class="tile-icon tile-leather">🔴</div>
    <div class="tile-body">
      <div class="tile-title title-leather">Leather T-30</div>
      <div class="tile-sub">Madison Leather · June 2026</div>
      <div class="tile-desc">Schedule coming soon</div>
    </div>
    <span class="tile-arrow">›</span>
  </a>

  <a class="tournament-tile" href="leather-t20.html">
    <div class="tile-icon tile-leather">🔴</div>
    <div class="tile-body">
      <div class="tile-title title-leather">Leather T-20</div>
      <div class="tile-sub">Madison Leather · August 2026</div>
      <div class="tile-desc">Schedule coming soon</div>
    </div>
    <span class="tile-arrow">›</span>
  </a>

</div>

<div class="footer">Madison Cricket Club &nbsp;·&nbsp; 2026 Season</div>

</body>
</html>
