<!DOCTYPE html>
<html lang="en">
<head>
<script src="cricclubs-stats.js"></script>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Tigers — Cricket Stats</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

.page-header {
  background: linear-gradient(150deg, #C05000 0%, #7A3200 100%);
  padding: 1.25rem 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 12px;
}
.page-header a { font-size: 26px; text-decoration: none; color: rgba(255,255,255,0.8); line-height: 1; flex-shrink: 0; }
.hdr-text h2 { font-size: 17px; font-weight: 700; color: #fff; }
.hdr-text p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.content { padding: 1.25rem; max-width: 900px; margin: 0 auto; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.slbl { font-size: 12px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: .06em; }

.tbl-wrap { overflow-x: auto; margin-bottom: 1.5rem; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; background: #fff; }
th { background: #FFFBF5; padding: 9px 10px; text-align: center; font-weight: 600; border-bottom: 1px solid #FEE9D8; color: #6B7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; user-select: none; }
th.sort-asc::after  { content: ' ▲'; font-size: 8px; }
th.sort-desc::after { content: ' ▼'; font-size: 8px; }
th.pcol { text-align: left; }
td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #F9FAFB; }
td.pcol { text-align: left; font-weight: 600; }
tr:last-child td { border-bottom: none; }
.ca { color: #92400E; font-weight: 700; }
.cs { color: #7A3200; font-weight: 700; }
.hl { font-weight: 700; color: #111827; }

.tab-nav { display: flex; gap: 4px; }
.tab-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; font-weight: 500; }
.tab-btn.active { background: #C05000; color: #fff; border-color: #C05000; }
.note { font-size: 13px; color: #9CA3AF; background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.hl { font-weight: 700; color: #111827; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html">&#8249;</a>
  <div class="hdr-text">
    <h2>🐯 Tigers — Cricket Stats</h2>
    <p>Batting &amp; bowling statistics · Tape T20 2026</p>
  </div>
</div>

<div class="content">
  <div class="section-header">
    <div class="slbl">Cricket Stats</div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="showStatsTab('batting',this)">Batting</button>
      <button class="tab-btn" onclick="showStatsTab('bowling',this)">Bowling</button>
    </div>
  </div>
  <div id="battingStats" class="tbl-wrap"></div>
  <div id="bowlingStats" class="tbl-wrap" style="display:none"></div>
  <div id="statsNote" class="note" style="display:none">No stats available. Run the scraper to update cricclubs-stats.js.</div>
</div>

<script>
var _batData = [], _batSort = { key: 'runs', dir: -1 };
var _bowlData = [], _bowlSort = { key: 'wickets', dir: -1 };

function showStatsTab(tab, btn) {
  document.getElementById('battingStats').style.display = tab === 'batting' ? '' : 'none';
  document.getElementById('bowlingStats').style.display = tab === 'bowling' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function _ovrsToDecimal(overs) {
  var parts = String(overs||'0').split('.');
  return parseInt(parts[0]) * 6 + (parts[1] ? parseInt(parts[1]) : 0);
}

function _sortData(data, key, dir) {
  return data.slice().sort(function(a, b) {
    var av, bv;
    if (key === 'name') return dir * (a.name||'').localeCompare(b.name||'');
    if (key === 'overs') { av = _ovrsToDecimal(a.overs); bv = _ovrsToDecimal(b.overs); }
    else if (key === 'highest') {
      av = parseInt(String(a.highest||'0').replace(/\D/g,'')); bv = parseInt(String(b.highest||'0').replace(/\D/g,''));
    } else if (key === 'bestFigures') {
      av = parseFloat(String(a.bestFigures||'0').replace('/','.'));
      bv = parseFloat(String(b.bestFigures||'0').replace('/','.'));
    } else {
      av = parseFloat(a[key]); bv = parseFloat(b[key]);
    }
    if (isNaN(av)) av = dir < 0 ? -Infinity : Infinity;
    if (isNaN(bv)) bv = dir < 0 ? -Infinity : Infinity;
    return dir * (av - bv);
  });
}

function _batHeaders(sk, sd) {
  var cols = [['Player','name'],['M','matches'],['Inn','innings'],['Balls','balls'],['Runs','runs'],['HS','highest'],['Avg','average'],['SR','strikeRate'],['4s','fours'],['6s','sixes'],['50s','fifties']];
  return cols.map(function(c) {
    var cls = c[1] === 'name' ? 'pcol' : '';
    if (c[1] === sk) cls += (cls ? ' ' : '') + (sd > 0 ? 'sort-asc' : 'sort-desc');
    return '<th' + (cls ? ' class="' + cls + '"' : '') + ' onclick="sortBat(\'' + c[1] + '\')">' + c[0] + '</th>';
  }).join('');
}

function _batRows(data) {
  return data.map(function(p, i) {
    return '<tr>'
      + '<td class="pcol">' + (i+1) + '. ' + p.name + '</td>'
      + '<td>' + (p.matches||0) + '</td>'
      + '<td>' + (p.innings||0) + '</td>'
      + '<td>' + (p.balls != null ? p.balls : '-') + '</td>'
      + '<td class="hl">' + (p.runs||0) + '</td>'
      + '<td>' + (p.highest||'-') + '</td>'
      + '<td class="ca">' + (p.average||'-') + '</td>'
      + '<td class="cs">' + (p.strikeRate||'-') + '</td>'
      + '<td>' + (p.fours||0) + '</td>'
      + '<td>' + (p.sixes||0) + '</td>'
      + '<td>' + (p.fifties||0) + '</td>'
      + '</tr>';
  }).join('');
}

function sortBat(key) {
  if (_batSort.key === key) _batSort.dir *= -1; else { _batSort.key = key; _batSort.dir = -1; }
  var el = document.getElementById('battingStats');
  el.querySelector('thead tr').innerHTML = _batHeaders(_batSort.key, _batSort.dir);
  el.querySelector('tbody').innerHTML = _batRows(_sortData(_batData, key, _batSort.dir));
}

function _bowlHeaders(sk, sd) {
  var cols = [['Player','name'],['M','matches'],['Ov','overs'],['Wkts','wickets'],['Runs','runs'],['Best','bestFigures'],['Avg','average'],['Econ','economy'],['SR','strikeRate']];
  return cols.map(function(c) {
    var cls = c[1] === 'name' ? 'pcol' : '';
    if (c[1] === sk) cls += (cls ? ' ' : '') + (sd > 0 ? 'sort-asc' : 'sort-desc');
    return '<th' + (cls ? ' class="' + cls + '"' : '') + ' onclick="sortBowl(\'' + c[1] + '\')">' + c[0] + '</th>';
  }).join('');
}

function _bowlRows(data) {
  return data.map(function(p, i) {
    return '<tr>'
      + '<td class="pcol">' + (i+1) + '. ' + p.name + '</td>'
      + '<td>' + (p.matches||0) + '</td>'
      + '<td>' + (p.overs||0) + '</td>'
      + '<td class="hl">' + (p.wickets||0) + '</td>'
      + '<td>' + (p.runs||0) + '</td>'
      + '<td>' + (p.bestFigures||'-') + '</td>'
      + '<td class="ca">' + (p.average||'-') + '</td>'
      + '<td class="cs">' + (p.economy||'-') + '</td>'
      + '<td>' + (p.strikeRate||'-') + '</td>'
      + '</tr>';
  }).join('');
}

function sortBowl(key) {
  if (_bowlSort.key === key) _bowlSort.dir *= -1; else { _bowlSort.key = key; _bowlSort.dir = -1; }
  var el = document.getElementById('bowlingStats');
  el.querySelector('thead tr').innerHTML = _bowlHeaders(_bowlSort.key, _bowlSort.dir);
  el.querySelector('tbody').innerHTML = _bowlRows(_sortData(_bowlData, key, _bowlSort.dir));
}

function renderCricStats() {
  if (typeof CRICCLUBS_STATS === 'undefined') {
    document.getElementById('statsNote').style.display = 'block';
    document.getElementById('battingStats').style.display = 'none';
    return;
  }
  var data = CRICCLUBS_STATS.tigers;

  var overrides = {};
  ((typeof MCC_CONFIG !== 'undefined' && MCC_CONFIG.tigers && MCC_CONFIG.tigers.playerOverrides) || []).forEach(function(o) {
    overrides[o.name.toLowerCase()] = o;
  });

  function mergedPlayers(statKey) {
    var byName = {};
    (data[statKey] || []).forEach(function(p) { byName[p.name] = p; });
    var seen = {}, names = [];
    (data.rankings || []).concat(data[statKey] || []).forEach(function(p) {
      if (!seen[p.name]) { seen[p.name] = true; names.push(p.name); }
    });
    var roster = (typeof MCC_CONFIG !== 'undefined' && MCC_CONFIG.tigers && MCC_CONFIG.tigers.players) || [];
    roster.forEach(function(configName) {
      var fw = configName.replace(/[^a-zA-Z]/g, ' ').trim().split(/\s+/)[0].toLowerCase();
      if (!fw) return;
      if (!names.some(function(n) { return n.toLowerCase().startsWith(fw); })) names.push(configName);
    });
    return names.map(function(n) {
      var src = byName[n] || { name: n };
      var fw = n.replace(/[^a-zA-Z]/g, ' ').trim().split(/\s+/)[0].toLowerCase();
      var ov = overrides[n.toLowerCase()] || overrides[fw];
      var p = {};
      for (var k in src) p[k] = src[k];
      if (ov) { for (var k in ov) { if (k !== 'name') p[k] = ov[k]; } }
      if (statKey === 'batting' && p.balls == null) {
        p.balls = (p.runs > 0 && p.strikeRate > 0) ? Math.round(p.runs * 100 / p.strikeRate) : null;
      }
      return p;
    });
  }

  _batData = mergedPlayers('batting');
  var batSorted = _sortData(_batData, _batSort.key, _batSort.dir);
  document.getElementById('battingStats').innerHTML = _batData.length
    ? '<table><thead><tr>' + _batHeaders(_batSort.key, _batSort.dir) + '</tr></thead><tbody>' + _batRows(batSorted) + '</tbody></table>'
    : '<div style="text-align:center;color:#9CA3AF;padding:20px">No batting data yet</div>';

  _bowlData = mergedPlayers('bowling');
  var bowlSorted = _sortData(_bowlData, _bowlSort.key, _bowlSort.dir);
  document.getElementById('bowlingStats').innerHTML = _bowlData.length
    ? '<table><thead><tr>' + _bowlHeaders(_bowlSort.key, _bowlSort.dir) + '</tr></thead><tbody>' + _bowlRows(bowlSorted) + '</tbody></table>'
    : '<div style="text-align:center;color:#9CA3AF;padding:20px">No bowling data yet</div>';
}

window.addEventListener('DOMContentLoaded', function() {
  renderCricStats();
});
</script>
</body>
</html>
