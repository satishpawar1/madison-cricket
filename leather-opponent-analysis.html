.section-label {
  font-size: 11px; font-weight: 600; color: #9CA3AF;

  padding: 14px 16px 10px; border-bottom: 1px solid #F3F4F6;

/* ── Game selector ── */

.coming-soon-body { font-size: 13px; color: #6B7280; line-height: 1.6; }

/* ── Format toggle ── */

.format-btn {

/* ── Routing ── */
function parseDate(gameDate) {
  var parts = gameDate.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}

function buildGameList() {
  var today = new Date(); today.setHours(0,0,0,0);
  var list = document.getElementById('gameList');

  if (!GAMES.length) {
    list.innerHTML = '<div style="padding:16px;font-size:13px;color:#9CA3AF;font-style:italic">No games scheduled yet.</div>';
    return;
  }

  GAMES.forEach(function(g) {
    var d = parseDate(g.gameDate); d.setHours(0,0,0,0);
    var past = today > d;
    var row = document.createElement('div');
    row.className = 'game-row';
    row.innerHTML =
      '<div class="date-box' + (past ? ' past' : '') + '">'
      + '<div class="date-day">' + d.getDate() + '</div>'
      + '<div class="date-mon">' + MONTHS[d.getMonth()] + '</div>'
      + '</div>'
      + '<div class="game-info">'
      + '<div class="game-opp">vs ' + g.opponent + '</div>'
      + '<div class="game-meta">' + g.day + ' · ' + g.time + ' · ' + g.ground + '</div>'
      + '</div>'
      + '<span class="game-arrow">›</span>';
    row.addEventListener('click', (function(game, pastFlag) {
      return function() { selectGame(game, pastFlag); };
    })(g, past));
    list.appendChild(row);
  });

  var firstUpcoming = GAMES.find(function(g) {
    var d = parseDate(g.gameDate); d.setHours(0,0,0,0);
    return today <= d;
  }) || GAMES[0];
  if (firstUpcoming) {
    var d = parseDate(firstUpcoming.gameDate); d.setHours(0,0,0,0);
    selectGame(firstUpcoming, today > d);
  }
}

function selectGame(game, past) {
  activeGame = game;

  document.querySelectorAll('.game-row').forEach(function(r) { r.classList.remove('active'); });
  var rows = document.querySelectorAll('.game-row');
  var idx = GAMES.indexOf(game);
  if (rows[idx]) rows[idx].classList.add('active');

  document.getElementById('oppName').textContent = game.opponent;
  document.getElementById('oppMeta').textContent =
    game.day + ' ' + game.date + ' · ' + game.time + ' · ' + game.ground
    + (past ? ' (played)' : '');
  document.getElementById('oppPanel').style.display = '';

  var data = OPP_DATA[game.opponent];
  if (data) {
    activeFormat = data.formats[0].key;
    renderStats(data, activeFormat);
  } else {
    renderComingSoon(game.opponent);
  }
}

window.switchFormat = function(key) {
  if (!activeGame) return;
  activeFormat = key;
  var data = OPP_DATA[activeGame.opponent];
  if (data) renderStats(data, key);
};

/* ── Renderers ── */
function renderComingSoon(oppName) {

    + '<div class="coming-soon-title">Stats Coming Soon</div>'
    + '<div class="coming-soon-body">We\'re building the pipeline to pull batting &amp; bowling data for <strong>' + escHtml(oppName) + '</strong>.<br><br>Check back before game day for key batters, bowlers, and scouting notes.</div>'
    + '<div class="info-pill">Data collection in progress</div>'
    + '</div>';
}

function renderStats(data, fmtKey) {
  var fmt = data.formats.filter(function(f) { return f.key === fmtKey; })[0];
  if (!fmt) return;

  var html = '<div class="stats-inner">';

  /* Format toggle */
  if (data.formats.length > 1) {
    html += '<div class="format-toggle">';
    data.formats.forEach(function(f) {
      html += '<button class="format-btn' + (f.key === fmtKey ? ' active' : '') + '" onclick="switchFormat(\'' + f.key + '\')">' + escHtml(f.label) + '</button>';
    });
    html += '</div>';
  }

  /* Source badge */
  html += '<div class="source-note">📋 <span><strong>Source:</strong> ' + escHtml(fmt.source) + '</span></div>';

  /* ── Batting ── */
  var batThreats = fmt.batting.filter(function(p) {
    return p.inns >= 3 && parseFloat(p.avg) >= 25;
  });

  if (batThreats.length) {
    html += '<div class="threat-label">⚠️ Watch These Batters</div>';
    html += '<div class="threat-grid">';
    batThreats.forEach(function(p) {
      var badges = '';
      if (p.hundreds > 0) badges += ' <span style="font-size:10px;background:#FEE2E2;color:#9B1C1C;border-radius:4px;padding:1px 5px">💯×' + p.hundreds + '</span>';
      if (p.fifties > 0)  badges += ' <span style="font-size:10px;background:#FEF3C7;color:#92400E;border-radius:4px;padding:1px 5px">50×' + p.fifties + '</span>';
      html += '<div class="threat-card">'
        + '<div class="threat-name">' + escHtml(p.name) + badges + '</div>'
        + '<div class="threat-stats">'
        + chip(p.avg, 'Avg', '#9B1C1C')
        + chip(p.sr,  'SR',  '#9B1C1C')
        + chip(p.hs,  'HS',  '#9B1C1C')
        + chip(String(p.runs), 'Runs', '#9B1C1C')
        + '</div>'
        + '</div>';
    });
    html += '</div>';
  }

  html += '<div class="table-label">Batting — ' + fmt.batting.length + ' players</div>';
  html += '<div style="overflow-x:auto"><table class="bat-table">';
  html += '<tr><th>Player</th><th>M</th><th>Runs</th><th>HS</th><th>Avg</th><th>SR</th><th>50s</th><th>6s</th></tr>';
  fmt.batting.forEach(function(p) {
    html += '<tr>'
      + '<td>' + escHtml(p.name) + '</td>'
      + '<td>' + p.mat + '</td>'
      + '<td style="font-weight:700;color:#111827">' + p.runs + '</td>'
      + '<td>' + p.hs + '</td>'
      + '<td>' + p.avg + '</td>'
      + '<td>' + p.sr + '</td>'
      + '<td>' + (p.fifties + p.hundreds > 0 ? p.fifties + (p.hundreds ? '+' + p.hundreds + '💯' : '') : '—') + '</td>'
      + '<td>' + (p.sixes > 0 ? p.sixes : '—') + '</td>'
      + '</tr>';
  });
  html += '</table></div>';

  /* ── Bowling ── */
  if (fmt.bowling && fmt.bowling.length) {
    html += '<div class="section-divider">';

    var bowlThreats = fmt.bowling.filter(function(p) { return p.wkts >= 7; });
    if (bowlThreats.length) {
      html += '<div class="threat-label" style="color:#1D4ED8">🎳 Key Bowlers to Watch</div>';
      html += '<div class="threat-grid">';
      bowlThreats.forEach(function(p) {
        var badges = '';
        if (p.fw5 > 0) badges += ' <span style="font-size:10px;background:#EFF6FF;color:#1D4ED8;border-radius:4px;padding:1px 5px">5w×' + p.fw5 + '</span>';
        if (p.fw4 > 0) badges += ' <span style="font-size:10px;background:#EFF6FF;color:#1D4ED8;border-radius:4px;padding:1px 5px">4w×' + p.fw4 + '</span>';
        html += '<div class="threat-card" style="background:#EFF6FF;border-color:#BFDBFE">'
          + '<div class="threat-name" style="color:#1E3A8A">' + escHtml(p.name) + badges + '</div>'
          + '<div class="threat-stats">'
          + chip(String(p.wkts), 'Wkts', '#1D4ED8')
          + chip(p.bbf,  'BBF',  '#1D4ED8')
          + chip(p.avg,  'Avg',  '#1D4ED8')
          + chip(p.econ, 'Econ', '#1D4ED8')
          + '</div>'
          + '</div>';
      });
      html += '</div>';
    }

    html += '<div class="table-label">Bowling — ' + fmt.bowling.length + ' bowlers</div>';
    html += '<div style="overflow-x:auto"><table class="bat-table">';
    html += '<tr><th>Player</th><th>M</th><th>Ov</th><th>Wkts</th><th>BBF</th><th>Avg</th><th>Econ</th><th>Wd</th></tr>';
    fmt.bowling.forEach(function(p) {
      var wideWarn = p.wides >= 30 ? ' style="color:#DC2626;font-weight:700"' : '';
      html += '<tr>'
        + '<td>' + escHtml(p.name) + '</td>'
        + '<td>' + p.mat + '</td>'
        + '<td>' + p.overs + '</td>'
        + '<td style="font-weight:700;color:#111827">' + p.wkts + '</td>'
        + '<td>' + p.bbf + '</td>'
        + '<td>' + p.avg + '</td>'
        + '<td>' + p.econ + '</td>'
        + '<td' + wideWarn + '>' + p.wides + '</td>'
        + '</tr>';
    });
    html += '</table></div>';
    html += '<div style="font-size:11px;color:#9CA3AF;margin-top:8px">Wd: wides in tournament — red = 30+ (loose).</div>';
    html += '</div>';
  } else if (!fmt.bowling) {
    html += '<div style="font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6;margin-top:16px;padding-top:14px">🎳 Bowling records not yet available for this format.</div>';
  }

  html += '</div>';
  document.getElementById('oppContent').innerHTML = html;
}

function chip(val, lbl, color) {
  return '<div class="threat-stat"><div class="val" style="color:' + color + '">' + val + '</div><div class="lbl">' + lbl + '</div></div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', buildGameList);
</script>
</body>
</html>
