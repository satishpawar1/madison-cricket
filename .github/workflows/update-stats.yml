name: Update Cricket Stats

on:
  workflow_dispatch:   # Manual trigger — run from GitHub Actions tab
  schedule:
    # Sunday games: 7 PM CDT = 00:00 UTC Monday (early finishers)
    - cron: '0 0 * * 1'
    # Sunday games: 10 PM CDT = 03:00 UTC Monday (late finishers)
    - cron: '0 3 * * 1'
    # Saturday games (e.g. May 30): same window, Saturday night
    - cron: '0 0 * * 0'
    - cron: '0 3 * * 0'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxss1 \
            libasound2t64 \
            libpango-1.0-0 \
            libpangocairo-1.0-0

      - name: Install Node dependencies
        working-directory: scraper
        run: npm ci

      - name: Run stats scraper
        working-directory: scraper
        run: node fetch-stats.js
        env:
          PUPPETEER_NO_SANDBOX: 'true'

      - name: Run toss scraper (incremental — only new matches)
        working-directory: scraper
        run: node fetch-toss.js
        env:
          PUPPETEER_NO_SANDBOX: 'true'

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cricclubs-stats.js toss-data.js scraper/toss-results.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update cricket stats $(date +'%Y-%m-%d') [skip ci]"
          git push

      - name: Export stats to Google Sheets for Claude.ai
        working-directory: scraper
        run: node export-to-sheets.js

      - name: Generate match summary page
        run: node scraper/generate-match-summary.js

      - name: Commit match summary if changed
        run: |
          git add latest-match-summary.html
          git diff --staged --quiet && echo "No summary changes" && exit 0
          git commit -m "Auto-generate match summary $(date +'%Y-%m-%d') [skip ci]"
          git push
