name: Update Leather Stats

on:
  workflow_dispatch:   # Manual trigger — run from GitHub Actions tab
  schedule:
    # Saturday games (8:30 AM CDT): run Saturday evening after game
    # 9 PM CDT = 02:00 UTC Sunday
    - cron: '0 2 * * 0'
    # Sunday morning catch-up in case it ran long
    - cron: '0 12 * * 0'

jobs:
  update-leather-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxss1 \
            libasound2t64 \
            libpango-1.0-0 \
            libpangocairo-1.0-0

      - name: Install Node dependencies
        working-directory: scraper
        run: npm ci

      - name: Run leather stats scraper
        working-directory: scraper
        run: node fetch-leather-stats.js
        env:
          PUPPETEER_NO_SANDBOX: 'true'

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leather-stats.js
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update leather stats $(date +'%Y-%m-%d') [skip ci]"
          git pull --rebase && git push
