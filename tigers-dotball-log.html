<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script src="config.js"></script>
<title>Madison Tigers — Dot Ball Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Courier New', Courier, monospace;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  padding: 1.5rem 1rem 3rem;
}

.hdr-team {
  text-align: center; font-size: 11px; letter-spacing: 0.28em;
  color: #8bc34a; text-transform: uppercase; margin-bottom: 8px;
}
.hdr-title {
  text-align: center; font-size: 26px; font-weight: 900;
  color: #e8e8e8; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 1.25rem;
}

/* Game selector */
.game-bar {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.game-bar label { font-size: 10px; letter-spacing: 0.15em; color: #4b5563; text-transform: uppercase; }
.game-bar select {
  font-family: 'Courier New', monospace; font-size: 12px;
  padding: 7px 12px; border: 1px solid #2d3748; border-radius: 6px;
  background: #161c27; color: #e8e8e8; flex: 1; max-width: 300px;
  -webkit-appearance: none; appearance: none;
}
.game-bar select:focus { outline: none; border-color: #4ade80; }

/* Summary box */
.summary-box {
  border: 1px solid #2d3748; border-radius: 10px;
  padding: 14px 24px; margin: 0 auto 1.5rem;
  max-width: 440px; display: flex;
  align-items: center; justify-content: center; gap: 12px;
  background: #161c27;
}
.sum-grp { display: flex; align-items: baseline; gap: 8px; }
.sum-item { text-align: center; }
.sum-label { font-size: 9px; letter-spacing: 0.18em; color: #4b5563; text-transform: uppercase; margin-bottom: 3px; }
.sum-val { font-size: 30px; font-weight: 800; line-height: 1; }
.sum-val.dots  { color: #e05252; }
.sum-val.balls { color: #e8e8e8; }
.sum-val.pct   { color: #4ade80; }
.sum-sep { font-size: 28px; color: #2d3748; align-self: center; padding-top: 6px; }
.sum-divider { width: 1px; height: 40px; background: #2d3748; }

/* Batter cards */
.batter-cards { max-width: 500px; margin: 0 auto; }
.batter-card {
  background: #161c27; border: 1px solid #2d3748;
  border-radius: 12px; margin-bottom: 1rem; overflow: hidden;
  transition: opacity 0.2s;
}
.batter-card.is-out { opacity: 0.45; }

.card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px 10px;
  border-bottom: 1px dashed #2d3748;
}
.card-header.selectable { cursor: pointer; }
.card-header.selectable:active { background: #1c2535; }

.slot-badge {
  font-size: 10px; font-weight: 700;
  background: #1a2d0e; color: #8bc34a;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.06em; flex-shrink: 0;
}
.batter-name {
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.05em; flex: 1; color: #e8e8e8;
}
.batter-name.placeholder { color: #3d4756; font-weight: 400; font-size: 13px; }
.out-badge {
  font-size: 10px; font-weight: 700;
  background: #2d0e0e; color: #e05252;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.1em;
}
.x-btn {
  background: none; border: none; color: #3d4756;
  font-size: 18px; cursor: pointer; padding: 0 2px;
  line-height: 1; flex-shrink: 0; font-family: inherit;
  transition: color 0.12s;
}
.x-btn:hover, .x-btn:active { color: #e05252; }

.card-stats {
  display: flex; align-items: center; gap: 14px;
  padding: 11px 14px 8px;
}
.stat-block { min-width: 44px; }
.stat-val { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-val.dots  { color: #e05252; }
.stat-val.balls { color: #e8e8e8; }
.stat-lbl { font-size: 9px; letter-spacing: 0.14em; color: #3d4756; text-transform: uppercase; margin-top: 3px; }

.rate-wrap { flex: 1; }
.rate-bar { height: 5px; background: #1a2535; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.rate-fill { height: 100%; background: #8bc34a; border-radius: 3px; transition: width 0.25s; }
.rate-lbl { font-size: 11px; color: #4b5563; letter-spacing: 0.04em; }

.card-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 8px 14px 14px;
}
.action-btn {
  font-family: 'Courier New', monospace;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 18px 10px; border: none; border-radius: 8px;
  cursor: pointer; touch-action: manipulation; user-select: none;
  transition: filter 0.08s, transform 0.08s;
}
.action-btn:active { filter: brightness(1.25); transform: scale(0.97); }
.action-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }
.btn-dot { background: #5c1a1a; color: #e05252; }
.btn-run { background: #1a4d1a; color: #4ade80; }

/* Bottom action bar */
.bottom-bar {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
  max-width: 500px; margin: 0.5rem auto 0;
}
.bar-btn {
  font-family: 'Courier New', monospace;
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
  padding: 13px 4px; border-radius: 8px; cursor: pointer;
  background: transparent; text-align: center;
  touch-action: manipulation; transition: filter 0.12s;
}
.bar-btn:active { filter: brightness(1.35); }
.bar-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.bb-add   { border: 1px dashed #4ade80; color: #4ade80; }
.bb-undo  { border: 1px dashed #4b5563; color: #6b7280; }
.bb-copy  { border: 1px dashed #818cf8; color: #818cf8; }
.bb-reset { border: 1px dashed #4b5563; color: #6b7280; }

/* Auto-save bar */
.autosave-bar {
  text-align: center; font-size: 10px; letter-spacing: 0.08em;
  margin-top: 1rem; display: none; max-width: 500px; margin-left: auto; margin-right: auto;
}
.autosave-bar.as-pending { color: #92400E; display: block; }
.autosave-bar.as-saving  { color: #4b5563; display: block; }
.autosave-bar.as-saved   { color: #4ade80; display: block; }
.autosave-bar.as-error   { color: #e05252; display: block; }

/* Selector overlay */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.overlay.open { display: flex; }
.sel-box {
  background: #161c27; border: 1px solid #2d3748; border-radius: 14px;
  padding: 20px; width: calc(100% - 2rem); max-width: 340px;
  max-height: 80vh; overflow-y: auto;
}
.sel-title {
  font-size: 10px; letter-spacing: 0.2em; color: #8bc34a;
  text-transform: uppercase; margin-bottom: 14px; text-align: center;
}
.p-opt {
  display: block; width: 100%;
  font-family: 'Courier New', monospace; font-size: 14px; font-weight: 600;
  text-align: left; background: #1c2535; border: 1px solid #2d3748;
  color: #e8e8e8; padding: 12px 16px; border-radius: 8px;
  cursor: pointer; margin-bottom: 6px; transition: background 0.1s;
}
.p-opt:active { background: #243040; }
.p-opt:disabled { opacity: 0.25; cursor: not-allowed; }
.sel-cancel {
  display: block; width: 100%; margin-top: 10px;
  font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.1em;
  background: none; border: 1px dashed #2d3748; color: #4b5563;
  padding: 10px; border-radius: 8px; cursor: pointer; text-align: center;
}

/* Confirm dialog */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 200;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: #161c27; border: 1px solid #2d3748; border-radius: 14px;
  padding: 24px 20px; width: calc(100% - 2rem); max-width: 320px; text-align: center;
}
.confirm-msg { font-size: 14px; color: #e8e8e8; margin-bottom: 20px; line-height: 1.6; letter-spacing: 0.03em; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-yes {
  flex: 1; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 12px; border-radius: 8px;
  border: none; background: #5c1a1a; color: #e05252; cursor: pointer;
}
.confirm-no {
  flex: 1; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 12px; border-radius: 8px;
  border: 1px solid #2d3748; background: transparent; color: #6b7280; cursor: pointer;
}
</style>
</head>
<body>

<div class="hdr-team">Madison Tigers</div>
<div class="hdr-title">Dot Ball Tracker</div>

<div class="game-bar">
  <label>Game</label>
  <select id="gameSelect"><option value="">— select game —</option></select>
</div>

<div class="summary-box">
  <div class="sum-item"><div class="sum-label">Dots</div><div class="sum-val dots" id="sumDots">0</div></div>
  <div class="sum-sep">/</div>
  <div class="sum-item"><div class="sum-label">Balls</div><div class="sum-val balls" id="sumBalls">0</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">Dot%</div><div class="sum-val pct" id="sumPct">0%</div></div>
</div>

<div class="batter-cards" id="batterCards"></div>

<div class="bottom-bar">
  <button class="bar-btn bb-add"  onclick="addBatter()">+ Batter</button>
  <button class="bar-btn bb-undo" id="undoBtn" onclick="undoLast()" disabled>Undo</button>
  <button class="bar-btn bb-copy" onclick="copyStats()">Copy</button>
  <button class="bar-btn bb-reset" onclick="askReset()">Reset</button>
</div>

<div class="autosave-bar" id="autosaveBar"></div>

<!-- Batter selector overlay -->
<div class="overlay" id="selOverlay">
  <div class="sel-box">
    <div class="sel-title">Select Batter</div>
    <div id="playerList"></div>
    <button class="sel-cancel" onclick="closeSelector()">Cancel</button>
  </div>
</div>

<!-- Reset confirm overlay -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg">Reset all data for this game?<br>This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="doReset()">Reset</button>
      <button class="confirm-no"  onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
var CFG = MCC_CONFIG.tigers;
var SCRIPT_URL = MCC_CONFIG.SCRIPT_URL;
var PL = CFG.players;

// ── State ─────────────────────────────────────────────────────────
var slots = [
  { id: 0, name: null, history: [], isOut: false },
  { id: 1, name: null, history: [], isOut: false }
];
var nextId = 2;
var actionStack = []; // [{slotId, type:'D'|'R'}] — global undo stack
var autoSaveTimer = null;
var pendingSlotId = null;
var LOCAL_KEY_PREFIX = 'dottrack_tigers_';

// ── Helpers ───────────────────────────────────────────────────────
function findSlot(id) {
  for (var i = 0; i < slots.length; i++) { if (slots[i].id === id) return slots[i]; }
  return null;
}
function slotStats(slot) {
  var dots = 0;
  for (var i = 0; i < slot.history.length; i++) { if (slot.history[i] === 'D') dots++; }
  var balls = slot.history.length;
  return { dots: dots, balls: balls, pct: balls > 0 ? Math.round(dots / balls * 100) : 0 };
}

// ── Render ────────────────────────────────────────────────────────
function renderAll() {
  var container = document.getElementById('batterCards');
  container.innerHTML = '';
  for (var i = 0; i < slots.length; i++) {
    container.appendChild(buildCard(slots[i], i));
  }
  updateSummary();
}

function buildCard(slot, idx) {
  var st = slotStats(slot);
  var hasName = slot.name !== null;
  var isOut = slot.isOut;

  var card = document.createElement('div');
  card.className = 'batter-card' + (isOut ? ' is-out' : '');

  // ── Header ──
  var hdr = document.createElement('div');
  hdr.className = 'card-header' + (!hasName && !isOut ? ' selectable' : '');
  if (!hasName && !isOut) hdr.onclick = function() { openSelector(slot.id); };

  var badge = document.createElement('span');
  badge.className = 'slot-badge';
  badge.textContent = '#' + (idx + 1);

  var nameEl = document.createElement('span');
  nameEl.className = 'batter-name' + (!hasName ? ' placeholder' : '');
  nameEl.textContent = hasName ? slot.name.toUpperCase() : 'tap to select batter';
  if (hasName && !isOut) {
    nameEl.style.cursor = 'pointer';
    (function(sid) {
      nameEl.onclick = function(e) { e.stopPropagation(); openSelector(sid); };
    })(slot.id);
  }

  hdr.appendChild(badge);
  hdr.appendChild(nameEl);

  if (isOut) {
    var outBadge = document.createElement('span');
    outBadge.className = 'out-badge';
    outBadge.textContent = 'OUT';
    hdr.appendChild(outBadge);
  }

  var xBtn = document.createElement('button');
  xBtn.className = 'x-btn';
  xBtn.textContent = '×';
  xBtn.title = isOut ? 'Remove' : (hasName ? 'Mark Out' : 'Remove slot');
  (function(s) {
    xBtn.onclick = function(e) {
      e.stopPropagation();
      if (s.isOut) {
        // Remove frozen card
        slots = slots.filter(function(x) { return x.id !== s.id; });
        actionStack = actionStack.filter(function(a) { return a.slotId !== s.id; });
        renderAll(); saveToLocal();
      } else if (s.name) {
        // Mark as out — freeze
        s.isOut = true;
        renderAll(); saveToLocal(); scheduleAutoSave();
      } else {
        // Remove empty slot (only if more than 2)
        if (slots.length > 2) {
          slots = slots.filter(function(x) { return x.id !== s.id; });
          renderAll();
        }
      }
    };
  })(slot);
  hdr.appendChild(xBtn);

  // ── Stats row ──
  var statsRow = document.createElement('div');
  statsRow.className = 'card-stats';

  var dotsBlk = document.createElement('div');
  dotsBlk.className = 'stat-block';
  dotsBlk.innerHTML = '<div class="stat-val dots">' + st.dots + '</div><div class="stat-lbl">Dots</div>';

  var ballsBlk = document.createElement('div');
  ballsBlk.className = 'stat-block';
  ballsBlk.innerHTML = '<div class="stat-val balls">' + st.balls + '</div><div class="stat-lbl">Balls</div>';

  var rateWrap = document.createElement('div');
  rateWrap.className = 'rate-wrap';
  rateWrap.innerHTML = '<div class="rate-bar"><div class="rate-fill" style="width:' + st.pct + '%"></div></div>'
    + '<div class="rate-lbl">' + st.pct + '% dot rate</div>';

  statsRow.appendChild(dotsBlk);
  statsRow.appendChild(ballsBlk);
  statsRow.appendChild(rateWrap);

  // ── Action buttons ──
  var btnRow = document.createElement('div');
  btnRow.className = 'card-btns';

  var dotBtn = document.createElement('button');
  dotBtn.className = 'action-btn btn-dot';
  dotBtn.textContent = 'DOT';
  dotBtn.disabled = !hasName || isOut;
  (function(sid) {
    dotBtn.onclick = function() { logAction(sid, 'D'); };
  })(slot.id);

  var runBtn = document.createElement('button');
  runBtn.className = 'action-btn btn-run';
  runBtn.textContent = 'RUN';
  runBtn.disabled = !hasName || isOut;
  (function(sid) {
    runBtn.onclick = function() { logAction(sid, 'R'); };
  })(slot.id);

  btnRow.appendChild(dotBtn);
  btnRow.appendChild(runBtn);

  card.appendChild(hdr);
  card.appendChild(statsRow);
  card.appendChild(btnRow);
  return card;
}

function updateSummary() {
  var totalDots = 0, totalBalls = 0;
  for (var i = 0; i < slots.length; i++) {
    var st = slotStats(slots[i]);
    totalDots += st.dots; totalBalls += st.balls;
  }
  var pct = totalBalls > 0 ? Math.round(totalDots / totalBalls * 100) : 0;
  document.getElementById('sumDots').textContent = totalDots;
  document.getElementById('sumBalls').textContent = totalBalls;
  document.getElementById('sumPct').textContent = pct + '%';
  document.getElementById('undoBtn').disabled = actionStack.length === 0;
}

// ── Actions ───────────────────────────────────────────────────────
function logAction(slotId, type) {
  var slot = findSlot(slotId);
  if (!slot || slot.isOut) return;
  slot.history.push(type);
  actionStack.push({ slotId: slotId, type: type });
  renderAll();
  saveToLocal();
  scheduleAutoSave();
}

function undoLast() {
  if (!actionStack.length) return;
  var last = actionStack.pop();
  var slot = findSlot(last.slotId);
  if (slot && slot.history.length > 0) slot.history.pop();
  renderAll();
  saveToLocal();
  scheduleAutoSave();
}

function addBatter() {
  // Find first truly empty slot
  for (var i = 0; i < slots.length; i++) {
    if (!slots[i].name && !slots[i].isOut) { openSelector(slots[i].id); return; }
  }
  // All slots have names — add a new slot
  var newSlot = { id: nextId++, name: null, history: [], isOut: false };
  slots.push(newSlot);
  renderAll();
  openSelector(newSlot.id);
}

// ── Batter selector ───────────────────────────────────────────────
function openSelector(slotId) {
  pendingSlotId = slotId;
  var activeName = [];
  for (var i = 0; i < slots.length; i++) {
    if (slots[i].name && !slots[i].isOut && slots[i].id !== slotId) activeName.push(slots[i].name);
  }
  var list = document.getElementById('playerList');
  list.innerHTML = '';
  for (var j = 0; j < PL.length; j++) {
    (function(name) {
      var btn = document.createElement('button');
      btn.className = 'p-opt';
      btn.textContent = name;
      btn.disabled = activeName.indexOf(name) >= 0;
      btn.onclick = function() { selectBatter(slotId, name); };
      list.appendChild(btn);
    })(PL[j]);
  }
  document.getElementById('selOverlay').classList.add('open');
}

function selectBatter(slotId, name) {
  var slot = findSlot(slotId);
  if (slot) {
    slot.name = name;
    slot.history = [];
    slot.isOut = false;
    // Clear undo actions for this slot since it's a fresh batter
    actionStack = actionStack.filter(function(a) { return a.slotId !== slotId; });
  }
  closeSelector();
  renderAll();
  saveToLocal();
}

function closeSelector() {
  document.getElementById('selOverlay').classList.remove('open');
  pendingSlotId = null;
}

// ── Reset ─────────────────────────────────────────────────────────
function askReset() {
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}
function doReset() {
  closeConfirm();
  slots = [
    { id: 0, name: null, history: [], isOut: false },
    { id: 1, name: null, history: [], isOut: false }
  ];
  nextId = 2; actionStack = [];
  var g = document.getElementById('gameSelect').value;
  if (g) clearLocal(g);
  if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
  renderAll();
  document.getElementById('autosaveBar').style.display = 'none';
}

// ── Copy to clipboard ─────────────────────────────────────────────
function copyStats() {
  var g = document.getElementById('gameSelect').value || 'Game';
  var lines = ['Tigers — Dot Ball Tracker', 'Game: ' + g, ''];
  var totalDots = 0, totalBalls = 0;
  for (var i = 0; i < slots.length; i++) {
    var s = slots[i];
    if (!s.name) continue;
    var st = slotStats(s);
    totalDots += st.dots; totalBalls += st.balls;
    lines.push(s.name + (s.isOut ? ' [OUT]' : '') + ': '
      + st.dots + ' dots / ' + st.balls + ' balls (' + st.pct + '% dot rate)');
  }
  if (totalBalls > 0) {
    lines.push('');
    lines.push('TOTAL: ' + totalDots + '/' + totalBalls + ' balls — '
      + Math.round(totalDots / totalBalls * 100) + '% dot rate');
  }
  var text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      setAutoSave('as-saved', '✓ Copied to clipboard');
    }).catch(function() { fallbackCopy(text); });
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); setAutoSave('as-saved', '✓ Copied to clipboard'); }
  catch(e) { setAutoSave('as-error', 'Copy failed — share manually'); }
  document.body.removeChild(ta);
}

// ── Persistence ───────────────────────────────────────────────────
function lsKey(g) { return LOCAL_KEY_PREFIX + g; }

function saveToLocal() {
  var g = document.getElementById('gameSelect').value;
  if (!g) return;
  try {
    localStorage.setItem(lsKey(g), JSON.stringify({
      ts: Date.now(), slots: slots, nextId: nextId, actionStack: actionStack
    }));
  } catch(e) {}
}

function loadFromLocal(g) {
  try {
    var raw = localStorage.getItem(lsKey(g));
    if (!raw) return false;
    var d = JSON.parse(raw);
    slots = d.slots || slots;
    nextId = d.nextId || nextId;
    actionStack = d.actionStack || [];
    return true;
  } catch(e) { return false; }
}

function clearLocal(g) {
  try { localStorage.removeItem(lsKey(g)); } catch(e) {}
}

function scheduleAutoSave() {
  var g = document.getElementById('gameSelect').value;
  if (!g) return;
  setAutoSave('as-pending', 'Unsaved changes...');
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(function() { submitToSheets(true); }, 8000);
}

function setAutoSave(cls, text) {
  var bar = document.getElementById('autosaveBar');
  bar.className = 'autosave-bar ' + cls;
  bar.textContent = text;
}

function submitToSheets(silent) {
  var g = document.getElementById('gameSelect').value;
  if (!g) return;
  var dotballs = [];
  for (var i = 0; i < slots.length; i++) {
    var s = slots[i];
    if (!s.name) continue;
    var st = slotStats(s);
    dotballs.push({ name: s.name, dots: st.dots, runs: st.balls - st.dots, balls: st.balls, isOut: s.isOut });
  }
  if (silent) setAutoSave('as-saving', 'Saving...');
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ type: 'dotballs', team: 'Tigers', game: g, dotballs: dotballs })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.status === 'ok') {
      clearLocal(g);
      var t = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      setAutoSave('as-saved', '✓ Saved at ' + t);
    } else {
      setAutoSave('as-error', 'Save failed — data safe on device');
    }
  })
  .catch(function() {
    setAutoSave('as-error', 'No connection — data safe on device');
  });
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var sel = document.getElementById('gameSelect');
  var today = new Date(); today.setHours(0,0,0,0);
  CFG.games.forEach(function(g) {
    var opt = document.createElement('option');
    opt.value = g.name;
    var parts = g.gameDate.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    opt.textContent = g.name + ' — ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                    + (today > d ? ' (played)' : '');
    sel.appendChild(opt);
  });

  sel.addEventListener('change', function() {
    var g = this.value;
    slots = [
      { id: 0, name: null, history: [], isOut: false },
      { id: 1, name: null, history: [], isOut: false }
    ];
    nextId = 2; actionStack = [];
    if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }

    if (!g) { renderAll(); document.getElementById('autosaveBar').style.display = 'none'; return; }

    // Try localStorage first
    if (loadFromLocal(g)) {
      renderAll();
      setAutoSave('as-pending', '📱 Restored from device — tap an action to continue');
      return;
    }
    // Fetch from Sheets
    fetch(SCRIPT_URL + '?type=dotballs&team=Tigers&game=' + encodeURIComponent(g))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === 'ok' && data.data && data.data.length) {
          slots = [];
          for (var i = 0; i < data.data.length; i++) {
            var p = data.data[i];
            var history = [];
            for (var d = 0; d < (p.dots || 0); d++) history.push('D');
            for (var r = 0; r < (p.runs || 0); r++) history.push('R');
            slots.push({ id: i, name: p.name, history: history, isOut: p.isOut || false });
          }
          if (slots.length < 2) {
            while (slots.length < 2) slots.push({ id: nextId++, name: null, history: [], isOut: false });
          }
          nextId = Math.max(nextId, slots.length);
          actionStack = [];
          setAutoSave('as-saved', 'Loaded from Sheets');
        }
        renderAll();
      })
      .catch(function() { renderAll(); });
  });

  renderAll();
});
</script>
