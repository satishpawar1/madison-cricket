<!DOCTYPE html>
<html lang="en">
<head>
<script src="cricclubs-stats.js"></script>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Cricket — Opponent Analysis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

.page-header {
  background: linear-gradient(150deg, #1A56B0 0%, #0C3A7A 100%);
  padding: 1.25rem 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 12px;
}
.page-header a { font-size: 26px; text-decoration: none; color: rgba(255,255,255,0.8); line-height: 1; flex-shrink: 0; }
.hdr-text h2 { font-size: 17px; font-weight: 700; color: #fff; }
.hdr-text p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.content { padding: 1.25rem; max-width: 600px; margin: 0 auto; }

/* ── Game picker ── */
.section-label { font-size: 11px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }

.game-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
.game-btn {
  display: flex; align-items: center; gap: 12px;
  background: #fff; border: 1.5px solid #E5E7EB; border-radius: 12px;
  padding: 12px 14px; cursor: pointer; text-align: left; width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.game-btn:active { background: #F9FAFB; }
.game-btn.selected { border-color: #1A56B0; box-shadow: 0 0 0 3px rgba(26,86,176,0.1); }
.game-btn.no-data  { opacity: 0.5; cursor: default; }

.game-date-block { flex-shrink: 0; width: 36px; text-align: center; }
.game-date-day { font-size: 16px; font-weight: 800; color: #111827; line-height: 1; }
.game-date-mon { font-size: 10px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; margin-top: 1px; }

.game-divider { width: 1px; height: 30px; background: #F3F4F6; flex-shrink: 0; }

.game-info { flex: 1; min-width: 0; }
.game-opponent { font-size: 14px; font-weight: 600; color: #111827; }
.game-meta { font-size: 11px; color: #9CA3AF; margin-top: 2px; }

.team-chip {
  flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; text-transform: uppercase;
}
.chip-lions  { background: #E8F1FC; color: #1A56B0; }
.chip-tigers { background: #FEF0E6; color: #C05000; }
.chip-won    { background: #E2F5EE; color: #0F5C43; }
.chip-lost   { background: #FEE2E2; color: #991B1B; }
.chip-played { background: #E2F5EE; color: #0F5C43; }
.chip-nodata { background: #F3F4F6; color: #9CA3AF; }

/* ── Analysis panel ── */
#analysis { display: none; }

.strength-banner {
  border-radius: 14px; padding: 14px 16px; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 12px;
}
.str-icon { font-size: 28px; flex-shrink: 0; }
.str-title { font-size: 15px; font-weight: 700; }
.str-sub   { font-size: 12px; margin-top: 3px; opacity: 0.8; }
.str-tough   { background: #FEE2E2; color: #991B1B; }
.str-competitive { background: #FFEDD5; color: #9A3412; }
.str-mid     { background: #FEF3C7; color: #92400E; }
.str-weak    { background: #E2F5EE; color: #0F5C43; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.stat-card {
  background: #fff; border-radius: 12px; padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); text-align: center;
}
.stat-card .num { font-size: 24px; font-weight: 800; line-height: 1; }
.stat-card .lbl { font-size: 11px; color: #9CA3AF; margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

.tab-row {
  display: flex; gap: 4px; margin-bottom: 1rem;
  background: #E9EDF2; border-radius: 10px; padding: 4px;
}
.tab-btn {
  flex: 1; text-align: center; padding: 7px 4px;
  font-size: 12px; font-weight: 600; border-radius: 7px;
  cursor: pointer; color: #6B7280; border: none; background: transparent;
}
.tab-btn.active { background: #fff; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

.season-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.season-btn {
  padding: 6px 16px; font-size: 12px; font-weight: 600; border-radius: 20px;
  cursor: pointer; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280;
}
.season-btn.active { background: #1A56B0; color: #fff; border-color: #1A56B0; }

.lb-card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow-x: auto; margin-bottom: 1rem;
}

/* ── Stats table ── */
.stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.stats-table th {
  background: #EEF2FF; color: #374151; font-weight: 700; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.03em;
  padding: 8px 7px; text-align: center; white-space: nowrap;
  border-bottom: 2px solid #E5E7EB;
}
.stats-table th.col-player { text-align: left; padding-left: 12px; }
.stats-table td {
  padding: 9px 7px; text-align: center; border-bottom: 1px solid #F3F4F6;
  white-space: nowrap; color: #374151;
}
.stats-table td.col-player {
  text-align: left; padding-left: 12px;
  font-weight: 600; color: #111827; max-width: 140px;
  overflow: hidden; text-overflow: ellipsis;
}
.stats-table tr:last-child td { border-bottom: none; }
.stats-table .rank-num { font-size: 11px; font-weight: 700; color: #D1D5DB; }
.stats-table .rank-num.r1 { color: #F59E0B; }
.stats-table .rank-num.r2 { color: #9CA3AF; }
.stats-table .rank-num.r3 { color: #CD7C2F; }
.stats-table tr.threat-row td { background: #FFF8F8; }
.threat-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: #DC2626; margin-left: 5px; vertical-align: middle; flex-shrink: 0;
}

.no-data-msg { background: #fff; border-radius: 14px; padding: 2rem; text-align: center; font-size: 13px; color: #9CA3AF; }
.lb-updated { font-size: 11px; color: #9CA3AF; text-align: center; margin-top: 0.5rem; }

/* ── Results section ── */
.results-agg {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
}
.results-agg .stat-card { padding: 10px 8px; }
.results-agg .stat-card .num { font-size: 20px; }

.result-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid #F9FAFB;
}
.result-row:last-child { border-bottom: none; }
.result-date { flex-shrink: 0; width: 36px; text-align: center; }
.result-date-day { font-size: 14px; font-weight: 800; color: #111827; line-height: 1; }
.result-date-mon { font-size: 10px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; margin-top: 1px; }
.result-info { flex: 1; min-width: 0; }
.result-score { font-size: 13px; font-weight: 700; color: #111827; }
.result-against { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
.result-badge {
  flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
}
.badge-win  { background: #E2F5EE; color: #0F5C43; }
.badge-loss { background: #FEE2E2; color: #991B1B; }
.badge-tie  { background: #FEF3C7; color: #92400E; }
.badge-nr   { background: #F3F4F6; color: #6B7280; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html">&#8249;</a>
  <div class="hdr-text">
    <h2>🔍 Opponent Analysis</h2>
    <p>Pick a game to scout the opposition</p>
  </div>
</div>

<div class="content">

  <div class="section-label" style="margin-bottom:6px">🦁 Lions upcoming games</div>
  <div class="game-list" id="lionsGames"></div>

  <div class="section-label" style="margin-bottom:6px">🐯 Tigers upcoming games</div>
  <div class="game-list" id="tigersGames"></div>

  <div id="analysis">
    <div class="strength-banner" id="strengthBanner">
      <div class="str-icon" id="strIcon"></div>
      <div><div class="str-title" id="strTitle"></div><div class="str-sub" id="strSub"></div></div>
    </div>

    <div class="season-toggle">
      <button class="season-btn active" onclick="switchSeason('2026', this)">2026 Season</button>
      <button class="season-btn" id="btn2025" onclick="switchSeason('2025', this)">2025 Season</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" id="statBatters" style="color:#1A56B0">—</div>
        <div class="lbl">Main batters</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statBowlers" style="color:#1A8F6A">—</div>
        <div class="lbl">Main bowlers</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statTopRuns" style="color:#1A56B0">—</div>
        <div class="lbl">Highest individual score</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statTopWkts" style="color:#1A8F6A">—</div>
        <div class="lbl">Top wickets</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statWon" style="color:#0F5C43">—</div>
        <div class="lbl">Wins</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statLost" style="color:#991B1B">—</div>
        <div class="lbl">Losses</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statRank" style="color:#7C3AED">—</div>
        <div class="lbl">Points table rank</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statPts" style="color:#7C3AED">—</div>
        <div class="lbl">Total points</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statNrr" style="color:#1A56B0">—</div>
        <div class="lbl">Net run rate</div>
      </div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('batting', this)">🏏 Batting</button>
      <button class="tab-btn" onclick="showTab('bowling', this)">🎯 Bowling</button>
      <button class="tab-btn" onclick="showTab('results', this)">📋 Results</button>
    </div>

    <div id="battingList" class="lb-card"></div>
    <div id="bowlingList" class="lb-card" style="display:none"></div>
    <div id="resultsList" style="display:none"></div>

    <div class="lb-updated" id="lbUpdated"></div>
  </div>

</div>

<script>
var selectedGame = null;
var currentTab = 'batting';
var currentSeason = '2026';

function getOpponents() {
  return currentSeason === '2025'
    ? (CRICCLUBS_STATS.opponents2025 || {})
    : (CRICCLUBS_STATS.opponents || {});
}

function switchSeason(season, btn) {
  currentSeason = season;
  document.querySelectorAll('.season-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (!selectedGame) return;
  var team = cricclubsTeam(selectedGame);
  var opp = getOpponents()[team];
  if (!opp) {
    document.getElementById('strengthBanner').className = 'strength-banner str-weak';
    document.getElementById('strIcon').textContent = '—';
    document.getElementById('strTitle').textContent = 'No ' + season + ' data available';
    document.getElementById('strSub').textContent = '';
    document.getElementById('battingList').innerHTML = '<div class="no-data-msg">No ' + season + ' data for this opponent</div>';
    document.getElementById('bowlingList').innerHTML = '<div class="no-data-msg">No ' + season + ' data for this opponent</div>';
    return;
  }
  renderStrength(team, opp);
  renderStats(opp);
  if (currentTab === 'results') {
    renderResults(team);
  } else {
    renderTab(currentTab, opp);
  }
}

function cricclubsTeam(game) {
  return game.cricclubsTeam || game.opponent;
}

function hasStats(game) {
  if (typeof CRICCLUBS_STATS === 'undefined') return false;
  var team = cricclubsTeam(game);
  var opp = CRICCLUBS_STATS.opponents && CRICCLUBS_STATS.opponents[team];
  return opp && (opp.batting.length > 0 || opp.bowling.length > 0);
}

function buildGameList(games, containerId, teamClass) {
  var today = new Date(); today.setHours(0,0,0,0);
  var html = '';
  games.forEach(function(g) {
    var parts = g.gameDate.split('-');
    var gd = new Date(+parts[0], +parts[1]-1, +parts[2]);
    var isPast = today > gd;
    var day = gd.getDate();
    var mon = gd.toLocaleDateString('en-US', {month:'short'});
    var stats = hasStats(g);
    var chipClass, chipText;
    if (isPast) {
      var mccName = g._team === 'lions' ? 'Madison Lions' : 'Madison Tigers';
      var mccResults = CRICCLUBS_STATS.results && CRICCLUBS_STATS.results[mccName];
      var oppName = cricclubsTeam(g);
      var gameResult = mccResults && mccResults.games && mccResults.games.find(function(r) { return r.opponent === oppName; });
      if (gameResult && gameResult.noResult) { chipClass = 'team-chip chip-nodata'; chipText = 'No Result'; }
      else if (gameResult && gameResult.won)  { chipClass = 'team-chip chip-won';    chipText = 'Won'; }
      else if (gameResult)                    { chipClass = 'team-chip chip-lost';   chipText = 'Lost'; }
      else                                    { chipClass = 'team-chip chip-played'; chipText = 'Played'; }
    } else if (!stats) { chipClass = 'team-chip chip-nodata'; chipText = 'No data yet'; }
    else { chipClass = 'team-chip ' + teamClass; chipText = 'Upcoming'; }

    var disabled = !stats ? ' no-data' : '';
    var onclick = stats ? ' onclick="selectGame(\'' + g.name + '\')"' : '';
    html += '<button class="game-btn' + disabled + '"' + onclick + ' data-game="' + g.name + '">'
      + '<div class="game-date-block"><div class="game-date-day">' + day + '</div><div class="game-date-mon">' + mon + '</div></div>'
      + '<div class="game-divider"></div>'
      + '<div class="game-info"><div class="game-opponent">vs ' + g.opponent + '</div><div class="game-meta">' + g.day + ' · ' + g.time + ' · ' + g.ground + '</div></div>'
      + '<span class="' + chipClass + '">' + chipText + '</span>'
      + '</button>';
  });
  document.getElementById(containerId).innerHTML = html;
}

var allGames = [];

function selectGame(name) {
  // Deselect all
  document.querySelectorAll('.game-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.querySelectorAll('[data-game="' + name + '"]').forEach(function(b) { b.classList.add('selected'); });

  selectedGame = allGames.filter(function(g) { return g.name === name; })[0];
  if (!selectedGame) return;

  var team = cricclubsTeam(selectedGame);
  var opp = getOpponents()[team] || CRICCLUBS_STATS.opponents[team];
  if (!opp) return;

  document.getElementById('analysis').style.display = 'block';
  renderStrength(team, opp);
  renderStats(opp);
  if (currentTab === 'results') {
    renderResults(team);
  } else {
    renderTab(currentTab, opp);
  }
  document.getElementById('analysis').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderStrength(team, opp) {
  var bat = opp.batting || [];
  var bowl = opp.bowling || [];

  var mainBatters = bat.filter(function(p) { return p.average >= 25 && p.strikeRate >= 100; }).length;
  function oversToAverageBallsStr(oversStr, innings) {
    var parts = String(oversStr).split('.');
    var balls = parseInt(parts[0]) * 6 + (parts[1] ? parseInt(parts[1]) : 0);
    return innings > 0 ? balls / innings : 0;
  }
  var mainBowlers = bowl.filter(function(p) {
    var avgBalls = oversToAverageBallsStr(p.overs, p.innings || 1);
    return avgBalls >= 12 && ((p.economy !== null && p.economy <= 7) || (p.average !== null && p.average < 10));
  }).length;

  // Look up standings for win rate + NRR
  var standings = currentSeason === '2025'
    ? (CRICCLUBS_STATS.standings2025 || [])
    : (CRICCLUBS_STATS.standings || []);
  var standing = standings.filter(function(s) { return s.team === team; })[0];

  var winRateScore = 0, nrrScore = 0;
  if (standing) {
    var wins   = standing.won  || 0;
    var losses = standing.lost || 0;
    var played = wins + losses;

    // For 2026, blend with 2025 history (weight 0.5) to correct for small samples
    if (currentSeason !== '2025') {
      var standing2025 = (CRICCLUBS_STATS.standings2025 || []).filter(function(s) { return s.team === team; })[0];
      if (standing2025) {
        wins   += (standing2025.won  || 0) * 0.5;
        losses += (standing2025.lost || 0) * 0.5;
        played  = wins + losses;
      }
    }

    var winRate = played > 0 ? wins / played : 0;
    winRateScore = Math.round(winRate * 5);
    nrrScore = (standing.nrr || 0) > 0 ? 1 : 0;
  }
  var batScore  = Math.min(mainBatters, 2);
  var bowlScore = Math.min(mainBowlers, 2);
  var score = winRateScore + batScore + bowlScore + nrrScore;

  var banner = document.getElementById('strengthBanner');
  var icon, title, sub, cls;
  if (score >= 8) {
    icon = '⚠️'; cls = 'strength-banner str-tough';
    title = 'Tough opponent — prepare carefully';
  } else if (score >= 6) {
    icon = '🔥'; cls = 'strength-banner str-competitive';
    title = 'Competitive opponent';
  } else if (score >= 4) {
    icon = '⚡'; cls = 'strength-banner str-mid';
    title = 'Average opponent';
  } else {
    icon = '✅'; cls = 'strength-banner str-weak';
    title = 'Easy opponent — stay focused';
  }

  var winPct = standing && (standing.won + standing.lost) > 0
    ? Math.round(standing.won / (standing.won + standing.lost) * 100) + '% win rate'
    : 'no record';
  sub = winPct + ' · ' + mainBatters + ' main batter' + (mainBatters !== 1 ? 's' : '')
      + ' · ' + mainBowlers + ' main bowler' + (mainBowlers !== 1 ? 's' : '');

  banner.className = cls;
  document.getElementById('strIcon').textContent  = icon;
  document.getElementById('strTitle').textContent = title;
  document.getElementById('strSub').textContent   = sub;
}

function renderStats(opp) {
  var bat  = opp.batting  || [];
  var bowl = opp.bowling  || [];
  var activeBatters = bat.filter(function(p) { return p.average >= 25 && p.strikeRate >= 100; }).length;
  document.getElementById('statBatters').textContent  = activeBatters;
  // Parse "4.3" overs string → total balls (4*6 + 3 = 27)
  function oversToAverageBalls(oversStr, innings) {
    var parts = String(oversStr).split('.');
    var balls = parseInt(parts[0]) * 6 + (parts[1] ? parseInt(parts[1]) : 0);
    return innings > 0 ? balls / innings : 0;
  }
  var mainBowlers = bowl.filter(function(p) {
    var avgBallsPerGame = oversToAverageBalls(p.overs, p.innings || 1);
    return avgBallsPerGame >= 12 && ((p.economy !== null && p.economy <= 7) || (p.average !== null && p.average < 10));
  }).length;
  document.getElementById('statBowlers').textContent  = mainBowlers;
  var highestScore = bat.length ? Math.max.apply(null, bat.map(function(p) { return p.highest || 0; })) : '—';
  document.getElementById('statTopRuns').textContent  = highestScore;
  document.getElementById('statTopWkts').textContent  = bowl.length ? bowl[0].wickets : '—';

  var team = cricclubsTeam(selectedGame);
  var standings = currentSeason === '2025'
    ? (CRICCLUBS_STATS.standings2025 || [])
    : (CRICCLUBS_STATS.standings || []);
  var standing = standings.filter(function(s) { return s.team === team; })[0];
  var rank = standing ? standings.indexOf(standing) + 1 : '—';
  document.getElementById('statWon').textContent  = standing ? standing.won    : '—';
  document.getElementById('statLost').textContent = standing ? standing.lost   : '—';
  document.getElementById('statRank').textContent = rank;
  document.getElementById('statPts').textContent  = standing ? standing.points : '—';
  document.getElementById('statNrr').textContent  = standing ? (standing.nrr > 0 ? '+' : '') + standing.nrr : '—';
}

function showTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-row .tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('battingList').style.display = tab === 'batting' ? '' : 'none';
  document.getElementById('bowlingList').style.display = tab === 'bowling' ? '' : 'none';
  document.getElementById('resultsList').style.display = tab === 'results' ? '' : 'none';
  if (selectedGame) {
    var team = cricclubsTeam(selectedGame);
    if (tab === 'results') {
      renderResults(team);
    } else {
      renderTab(tab, getOpponents()[team] || CRICCLUBS_STATS.opponents[team]);
    }
  }
}

function rankClass(i) {
  return i === 0 ? 'lb-rank r1' : i === 1 ? 'lb-rank r2' : i === 2 ? 'lb-rank r3' : 'lb-rank';
}

function renderTab(tab, opp) {
  if (tab === 'batting') {
    var bat = opp.batting || [];
    if (!bat.length) { document.getElementById('battingList').innerHTML = '<div class="no-data-msg">No batting data yet</div>'; return; }
    var rows = bat.map(function(p, i) {
      var isThreat = p.average >= 25 && p.strikeRate > 100;
      var rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      return '<tr' + (isThreat ? ' class="threat-row"' : '') + '>'
        + '<td><span class="rank-num ' + rc + '">' + (i+1) + '</span></td>'
        + '<td class="col-player">' + p.name + (isThreat ? '<span class="threat-dot"></span>' : '') + '</td>'
        + '<td>' + (p.matches||0) + '</td>'
        + '<td>' + (p.innings||0) + '</td>'
        + '<td>' + (p.notOuts||0) + '</td>'
        + '<td style="color:#1A56B0;font-weight:700">' + (p.runs||0) + '</td>'
        + '<td>' + (p.balls||0) + '</td>'
        + '<td>' + (p.highest||'-') + '</td>'
        + '<td>' + (p.fours||0) + '</td>'
        + '<td>' + (p.sixes||0) + '</td>'
        + '<td>' + (p.average||'-') + '</td>'
        + '<td>' + (p.strikeRate||'-') + '</td>'
        + '<td>' + (p.fifties||0) + '</td>'
        + '<td>' + (p.hundreds||0) + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('battingList').innerHTML =
      '<table class="stats-table"><thead><tr>'
      + '<th>#</th><th class="col-player">Player</th>'
      + '<th>Mat</th><th>Inns</th><th>NO</th><th>Runs</th><th>Balls</th>'
      + '<th>HS</th><th>4s</th><th>6s</th><th>Avg</th><th>SR</th>'
      + '<th>50s</th><th>100s</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table>';
  } else {
    var bowl = opp.bowling || [];
    if (!bowl.length) { document.getElementById('bowlingList').innerHTML = '<div class="no-data-msg">No bowling data yet</div>'; return; }
    var rows = bowl.map(function(p, i) {
      var isThreat = p.economy !== null && p.economy <= 7 && p.average !== null && p.average <= 12;
      var rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      var ovrsParts = String(p.overs||'0').split('.');
      var totalBalls = parseInt(ovrsParts[0]) * 6 + (ovrsParts[1] ? parseInt(ovrsParts[1]) : 0);
      var inns = p.innings || 1;
      var ovrsPerInn = inns > 0 ? (totalBalls / inns / 6).toFixed(1) : '-';
      return '<tr' + (isThreat ? ' class="threat-row"' : '') + '>'
        + '<td><span class="rank-num ' + rc + '">' + (i+1) + '</span></td>'
        + '<td class="col-player">' + p.name + (isThreat ? '<span class="threat-dot"></span>' : '') + '</td>'
        + '<td>' + (p.matches||0) + '</td>'
        + '<td>' + (p.innings||0) + '</td>'
        + '<td>' + (p.overs||0) + '</td>'
        + '<td>' + ovrsPerInn + '</td>'
        + '<td style="color:#1A8F6A;font-weight:700">' + (p.wickets||0) + '</td>'
        + '<td>' + (p.economy||'-') + '</td>'
        + '<td>' + (p.average||'-') + '</td>'
        + '</tr>';
    }).join('');
    document.getElementById('bowlingList').innerHTML =
      '<table class="stats-table"><thead><tr>'
      + '<th>#</th><th class="col-player">Player</th>'
      + '<th>Mat</th><th>Inns</th><th>Overs</th><th>Ovrs/Inn</th>'
      + '<th>Wkts</th><th>Econ</th><th>Avg</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table>';
  }
}

function renderResults(team) {
  var container = document.getElementById('resultsList');
  var src = currentSeason === '2025' ? CRICCLUBS_STATS.results2025 : CRICCLUBS_STATS.results;
  var results = src && src[team];
  if (!results || !results.games || !results.games.length) {
    container.innerHTML = '<div class="no-data-msg">No match results yet</div>';
    return;
  }

  var agg = '<div class="results-agg">'
    + '<div class="stat-card"><div class="num" style="color:#1A56B0">' + results.highestTotal + '</div><div class="lbl">Highest total</div></div>'
    + '<div class="stat-card"><div class="num" style="color:#9CA3AF">' + results.lowestTotal + '</div><div class="lbl">Lowest total</div></div>'
    + '<div class="stat-card"><div class="num" style="color:#1A8F6A">' + results.averageScore + '</div><div class="lbl">Avg score</div></div>'
    + '</div>';

  var rows = results.games.map(function(g) {
    var d = new Date(g.date + 'T00:00:00');
    var day = d.getDate();
    var mon = d.toLocaleDateString('en-US', {month:'short'});
    var scoreStr = g.runsScored + '/' + (g.wickets || 0) + ' (' + g.overs + ' ov)';
    var vs = 'vs ' + g.opponent + ' — conceded ' + g.runsConceded;
    var resultCls, resultTxt;
    if (g.noResult) { resultCls = 'badge-nr'; resultTxt = 'No Result'; }
    else if (g.won) { resultCls = 'badge-win'; resultTxt = 'Won'; }
    else if (g.runsScored < g.runsConceded) { resultCls = 'badge-loss'; resultTxt = 'Lost'; }
    else { resultCls = 'badge-tie'; resultTxt = 'Tied'; }
    return '<div class="result-row">'
      + '<div class="result-date"><div class="result-date-day">' + day + '</div><div class="result-date-mon">' + mon + '</div></div>'
      + '<div class="result-info"><div class="result-score">' + scoreStr + '</div><div class="result-against">' + vs + '</div></div>'
      + '<span class="result-badge ' + resultCls + '">' + resultTxt + '</span>'
      + '</div>';
  }).join('');

  container.innerHTML = agg + '<div class="lb-card">' + rows + '</div>';
}

window.addEventListener('DOMContentLoaded', function() {
  if (typeof CRICCLUBS_STATS === 'undefined' || typeof MCC_CONFIG === 'undefined') {
    document.querySelector('.content').innerHTML = '<div class="no-data-msg">Stats not loaded. Run the scraper first.</div>';
    return;
  }

  var today = new Date(); today.setHours(0,0,0,0);

  // Combine all games, tag with team, sort by date
  var lionsGames  = MCC_CONFIG.lions.games.map(function(g)  { return Object.assign({}, g, {_team:'lions'}); });
  var tigersGames = MCC_CONFIG.tigers.games.map(function(g) { return Object.assign({}, g, {_team:'tigers'}); });
  allGames = lionsGames.concat(tigersGames);

  buildGameList(lionsGames,  'lionsGames',  'chip-lions');
  buildGameList(tigersGames, 'tigersGames', 'chip-tigers');

  var updated = new Date(CRICCLUBS_STATS.lastUpdated);
  document.getElementById('lbUpdated').textContent = 'Stats updated '
    + updated.toLocaleDateString('en-US', {month:'short', day:'numeric'})
    + ' at ' + updated.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
});
</script>
