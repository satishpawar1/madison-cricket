<!DOCTYPE html>
<html lang="en">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Lions — Catch Efficiency</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

.page-header {
  background: linear-gradient(150deg, #1A56B0 0%, #0C3A7A 100%);
  padding: 1.25rem 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 12px;
}
.page-header a { font-size: 26px; text-decoration: none; color: rgba(255,255,255,0.8); line-height: 1; flex-shrink: 0; }
.hdr-text h2 { font-size: 17px; font-weight: 700; color: #fff; }
.hdr-text p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.content { padding: 1.25rem; max-width: 900px; margin: 0 auto; }

.stat-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
.sc {
  background: #fff; border-radius: 14px; padding: 16px 12px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.sn { font-size: 26px; font-weight: 700; }
.sl { font-size: 11px; color: #9CA3AF; margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.section-label { font-size: 12px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: .06em; }
.sort-row { display: flex; gap: 8px; align-items: center; }
.sort-row label { font-size: 12px; color: #9CA3AF; }
.sort-row select {
  font-size: 13px; padding: 6px 10px; border: 1.5px solid #E5E7EB;
  border-radius: 8px; background: #fff; color: #111827;
}

.player-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.player-row {
  background: #fff; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.player-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.player-name { font-size: 14px; font-weight: 600; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #E8F1FC; color: #1A56B0; font-weight: 600; }

.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 11px; color: #9CA3AF; width: 65px; flex-shrink: 0; font-weight: 500; }
.bar-track { flex: 1; background: #F3F4F6; border-radius: 6px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #1A56B0, #3B82F6); border-radius: 6px; transition: width 0.3s; }
.bar-pct { font-size: 11px; font-weight: 700; width: 36px; text-align: right; color: #1A56B0; flex-shrink: 0; }

.note {
  font-size: 13px; color: #9CA3AF; background: #fff;
  border-radius: 12px; padding: 20px; text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.loading { text-align: center; color: #9CA3AF; font-size: 14px; padding: 3rem; }
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html">&#8249;</a>
  <div class="hdr-text">
    <h2>🦁 Lions — Catch Efficiency</h2>
    <p>Fielding stats across completed games</p>
  </div>
</div>

<div class="content">
  <div id="loading" class="loading">Loading&hellip;</div>
  <div id="content" style="display:none">
    <div class="stat-cards">
      <div class="sc"><div class="sn" id="sumAtt" style="color:#1A56B0">0</div><div class="sl">Total attempted</div></div>
      <div class="sc"><div class="sn" id="sumTak" style="color:#1A8F6A">0</div><div class="sl">Catches taken</div></div>
      <div class="sc"><div class="sn" id="sumEff" style="color:#1A56B0">0%</div><div class="sl">Team efficiency</div></div>
    </div>

    <div class="section-header">
      <div class="section-label">Player catch efficiency</div>
      <div class="sort-row">
        <label>Sort by</label>
        <select id="sortBy" onchange="render()">
          <option value="eff">Efficiency</option>
          <option value="att">Catches attempted</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>
    <div class="player-list" id="playerList"></div>
  </div>
</div>

<script>
const SCRIPT_URL = MCC_CONFIG.SCRIPT_URL;
const TEAM = 'Lions';
let catchData = MCC_CONFIG.lions.catchData || [];

function fetchData() {
  fetch(SCRIPT_URL+'?type=catches&team='+TEAM)
    .then(r=>r.json())
    .then(d=>{ if(d.status==='ok'&&d.data&&d.data.length) catchData=d.data; showContent(); })
    .catch(()=>showContent());
}

function showContent() {
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  const withData=catchData.filter(p=>p.att>0);
  const totalAtt=withData.reduce((s,p)=>s+p.att,0);
  const totalTak=withData.reduce((s,p)=>s+p.tak,0);
  document.getElementById('sumAtt').textContent=totalAtt;
  document.getElementById('sumTak').textContent=totalTak;
  document.getElementById('sumEff').textContent=totalAtt?Math.round(totalTak/totalAtt*100)+'%':'0%';
  render();
}

function render() {
  const sort=document.getElementById('sortBy').value;
  const withData=catchData.filter(p=>p.att>0);
  const sorted=[...withData].sort((a,b)=>{ const eA=a.att?a.tak/a.att:0,eB=b.att?b.tak/b.att:0; if(sort==='eff') return eB-eA; if(sort==='att') return b.att-a.att; return a.name.localeCompare(b.name); });
  document.getElementById('playerList').innerHTML=sorted.map((p,i)=>{
    const eff=p.att?Math.round(p.tak/p.att*100):0;
    return '<div class="player-row"><div class="player-top"><span class="player-name">'+(i+1)+'. '+p.name+'</span><span class="badge">'+p.tak+'/'+p.att+' taken</span></div><div class="bar-row"><span class="bar-label">Efficiency</span><div class="bar-track"><div class="bar-fill" style="width:'+eff+'%"></div></div><span class="bar-pct">'+eff+'%</span></div></div>';
  }).join('')||'<div class="note">No catch data recorded yet. Use Log Catch Efficiency to add data.</div>';
}
fetchData();
</script>
</body>
</html>
