<!DOCTYPE html>
<html lang="en">
<head>
<script src="leather-stats.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Madison Leather — Stats Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

.page-header {
  background: linear-gradient(150deg, #9B1C1C 0%, #7B0000 100%);
  padding: 1.25rem 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 12px;
}
.page-header a { font-size: 26px; text-decoration: none; color: rgba(255,255,255,0.8); line-height: 1; flex-shrink: 0; }
.page-header a:active { color: #fff; }
.hdr-text h2 { font-size: 17px; font-weight: 700; color: #fff; }
.hdr-text p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }

.content { padding: 1.25rem; max-width: 900px; margin: 0 auto; }

.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }

.pill-nav { display: flex; gap: 4px; }
.pill-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; font-weight: 500; -webkit-tap-highlight-color: transparent; }
.pill-btn.active { background: #9B1C1C; color: #fff; border-color: #9B1C1C; }

.tbl-wrap { overflow-x: auto; margin-bottom: 1.5rem; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; background: #fff; }
th { background: #FFF5F5; padding: 9px 10px; text-align: center; font-weight: 600; border-bottom: 1px solid #FEE2E2; color: #6B7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
th.pcol { text-align: left; }
th.sortable { cursor: pointer; user-select: none; -webkit-user-select: none; }
th.sortable:hover { color: #9B1C1C; background: #FEE2E2; }
th.sort-active { color: #9B1C1C; }
.sort-icon { margin-left: 3px; font-size: 9px; opacity: 0.5; }
th.sort-active .sort-icon { opacity: 1; }
td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #F9FAFB; }
td.pcol { text-align: left; font-weight: 600; }
tr:last-child td { border-bottom: none; }
.ca { color: #9B1C1C; font-weight: 700; }
.cs { color: #7B0000; font-weight: 700; }
.hl { font-weight: 700; color: #111827; }

.note { font-size: 13px; color: #9CA3AF; background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }

.year-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }
.y2025 { background: #FEE2E2; color: #9B1C1C; }
.y2024 { background: #E0F2FE; color: #0369A1; }
</style>
</head>
<body>

<div class="page-header">
  <a href="leather-t20.html">&#8249;</a>
  <div class="hdr-text">
    <h2>🔴 Madison Leather — Stats</h2>
    <p id="hdrSubtitle">Batting &amp; bowling · 2025 Leather T-20</p>
  </div>
</div>

<div class="content">

  <div class="controls">
    <div class="pill-nav" id="yearNav">
      <button class="pill-btn active" onclick="setYear('2025',this)">2025</button>
      <button class="pill-btn" onclick="setYear('2024',this)">2024</button>
      <button class="pill-btn" onclick="setYear('all',this)">All Years</button>
    </div>
    <div class="pill-nav" id="statNav">
      <button class="pill-btn active" onclick="setStat('batting',this)">Batting</button>
      <button class="pill-btn" onclick="setStat('bowling',this)">Bowling</button>
    </div>
  </div>

  <div id="battingWrap" class="tbl-wrap"></div>
  <div id="bowlingWrap" class="tbl-wrap" style="display:none"></div>
  <div id="statsNote" class="note" style="display:none">No stats available. Run <code>node scraper/fetch-leather-stats.js</code> to populate data.</div>

</div>

<script>
var activeYear = '2025';
var activeStat = 'batting';

// sort state: col key + direction ('asc'/'desc')
var batSort  = { col: 'runs',    dir: 'desc' };
var bowlSort = { col: 'wickets', dir: 'desc' };

// columns that default to ascending when first clicked (lower = better or alphabetical)
var ascDefaultCols = { name: true, average: true, economy: true, strikeRate_bowl: true };

// ── batting column definitions ────────────────────────────────────────────────
var BAT_COLS = [
  { key: 'name',       label: 'Player',  cls: 'pcol' },
  { key: 'matches',    label: 'M' },
  { key: 'innings',    label: 'Inn' },
  { key: 'runs',       label: 'Runs',    cls: 'hl' },
  { key: 'highestNum', label: 'HS' },
  { key: 'average',    label: 'Avg',     cls: 'ca', fmt: function(v) { return v ? v.toFixed(1) : '-'; } },
  { key: 'strikeRate', label: 'SR',      cls: 'cs', fmt: function(v) { return v ? v.toFixed(1) : '-'; } },
  { key: 'fours',      label: '4s' },
  { key: 'sixes',      label: '6s' },
  { key: 'fifties',    label: '50s' },
];

// ── bowling column definitions ────────────────────────────────────────────────
var BOWL_COLS = [
  { key: 'name',        label: 'Player',  cls: 'pcol' },
  { key: 'matches',     label: 'M' },
  { key: 'oversFloat',  label: 'Ov' },
  { key: 'wickets',     label: 'Wkts',   cls: 'hl' },
  { key: 'bestSort',    label: 'Best' },
  { key: 'average',     label: 'Avg',    cls: 'ca', fmt: function(v) { return v ? v.toFixed(2) : '-'; } },
  { key: 'economy',     label: 'Econ',   cls: 'cs', fmt: function(v) { return v ? v.toFixed(2) : '-'; } },
  { key: 'strikeRate',  label: 'SR',               fmt: function(v) { return v ? v.toFixed(1) : '-'; } },
];

function setYear(year, btn) {
  activeYear = year;
  document.querySelectorAll('#yearNav .pill-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var subtitles = { '2025': '2025 Leather T-20', '2024': '2024 Leather T-20', 'all': 'All Years (2024–2025)' };
  document.getElementById('hdrSubtitle').textContent = subtitles[year];
  render();
}

function setStat(stat, btn) {
  activeStat = stat;
  document.querySelectorAll('#statNav .pill-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('battingWrap').style.display = stat === 'batting' ? '' : 'none';
  document.getElementById('bowlingWrap').style.display = stat === 'bowling' ? '' : 'none';
}

function sortOn(type, col) {
  var s = type === 'bat' ? batSort : bowlSort;
  if (s.col === col) {
    s.dir = s.dir === 'desc' ? 'asc' : 'desc';
  } else {
    s.col = col;
    // avg/economy/SR lower is better → default asc; everything else → default desc
    s.dir = (col === 'average' || col === 'economy' || col === 'strikeRate' || col === 'name') ? 'asc' : 'desc';
  }
  render();
}

function applySort(players, sortState, type) {
  var col = sortState.col;
  var dir = sortState.dir;
  return players.slice().sort(function(a, b) {
    var av = a[col], bv = b[col];
    // null/undefined always to bottom regardless of direction
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    var cmp = (typeof av === 'string') ? av.localeCompare(bv) : av - bv;
    return dir === 'desc' ? -cmp : cmp;
  });
}

function sortIcon(sortState, col) {
  if (sortState.col !== col) return '<span class="sort-icon">⇅</span>';
  return '<span class="sort-icon">' + (sortState.dir === 'desc' ? '▼' : '▲') + '</span>';
}

// ── helpers ───────────────────────────────────────────────────────────────────
function getOversFloat(overs) {
  var s = String(overs || '0');
  var parts = s.split('.');
  return (parseInt(parts[0]) || 0) + (parseInt(parts[1]) || 0) / 6;
}

function oversToString(totalBalls) {
  var ov = Math.floor(totalBalls / 6), bl = totalBalls % 6;
  return bl > 0 ? ov + '.' + bl : String(ov);
}

function hsNum(v) { return parseInt(String(v || '0').replace('*', '')) || 0; }

// ── aggregate ────────────────────────────────────────────────────────────────
function aggregateBatting(rows2024, rows2025) {
  var map = {};
  function add(row, year) {
    var key = row.name;
    if (!map[key]) map[key] = { name: row.name, team: row.team, matches: 0, innings: 0, notOuts: 0,
      runs: 0, balls: 0, highest: '0', highestNum: 0, hundreds: 0, fifties: 0, sixes: 0, fours: 0, years: [] };
    var p = map[key];
    p.matches += row.matches || 0; p.innings += row.innings || 0; p.notOuts += row.notOuts || 0;
    p.runs += row.runs || 0; p.balls += row.balls || 0;
    p.hundreds += row.hundreds || 0; p.fifties += row.fifties || 0;
    p.sixes += row.sixes || 0; p.fours += row.fours || 0;
    var n = hsNum(row.highest);
    if (n > p.highestNum) { p.highestNum = n; p.highest = row.highest || '0'; }
    if (p.years.indexOf(year) < 0) p.years.push(year);
  }
  (rows2024 || []).forEach(function(r) { add(r, '2024'); });
  (rows2025 || []).forEach(function(r) { add(r, '2025'); });
  return Object.values(map).map(function(p) {
    var outs = p.innings - p.notOuts;
    p.average    = outs > 0 ? parseFloat((p.runs / outs).toFixed(2)) : (p.runs > 0 ? p.runs : 0);
    p.strikeRate = p.balls > 0 ? parseFloat((p.runs / p.balls * 100).toFixed(2)) : 0;
    return p;
  });
}

function aggregateBowling(rows2024, rows2025) {
  var map = {};
  function add(row, year) {
    var key = row.name;
    if (!map[key]) map[key] = { name: row.name, team: row.team, matches: 0, innings: 0,
      totalBalls: 0, runs: 0, wickets: 0, maidens: 0,
      bestWkts: 0, bestRuns: 999, bestFigures: '-',
      hattricks: 0, fourWickets: 0, fiveWickets: 0, years: [] };
    var p = map[key];
    p.matches += row.matches || 0; p.innings += row.innings || 0;
    p.totalBalls += Math.round(getOversFloat(row.overs) * 6);
    p.runs += row.runs || 0; p.wickets += row.wickets || 0; p.maidens += row.maidens || 0;
    p.hattricks += row.hattricks || 0; p.fourWickets += row.fourWickets || 0; p.fiveWickets += row.fiveWickets || 0;
    var bf = String(row.bestFigures || ''), parts = bf.split('/');
    if (parts.length === 2) {
      var bw = parseInt(parts[0]) || 0, br = parseInt(parts[1]) || 0;
      if (bw > p.bestWkts || (bw === p.bestWkts && br < p.bestRuns)) {
        p.bestWkts = bw; p.bestRuns = br; p.bestFigures = bf;
      }
    }
    if (p.years.indexOf(year) < 0) p.years.push(year);
  }
  (rows2024 || []).forEach(function(r) { add(r, '2024'); });
  (rows2025 || []).forEach(function(r) { add(r, '2025'); });
  return Object.values(map).map(function(p) {
    p.overs      = oversToString(p.totalBalls);
    p.oversFloat = p.totalBalls / 6;
    p.bestSort   = p.bestWkts * 1000 - p.bestRuns; // higher = better, for sort
    p.economy    = p.totalBalls > 0 ? parseFloat((p.runs / (p.totalBalls / 6)).toFixed(2)) : null;
    p.average    = p.wickets   > 0 ? parseFloat((p.runs / p.wickets).toFixed(2)) : null;
    p.strikeRate = p.wickets   > 0 ? parseFloat((p.totalBalls / p.wickets).toFixed(1)) : null;
    return p;
  });
}

function enrichBatting(rows) {
  return rows.map(function(p) {
    var r = Object.assign({}, p);
    r.highestNum = hsNum(r.highest);
    return r;
  });
}

function enrichBowling(rows) {
  return rows.map(function(p) {
    var r = Object.assign({}, p);
    r.oversFloat = getOversFloat(r.overs);
    var bf = String(r.bestFigures || ''), parts = bf.split('/');
    r.bestSort = parts.length === 2 ? (parseInt(parts[0]) || 0) * 1000 - (parseInt(parts[1]) || 999) : 0;
    return r;
  });
}

// ── table renderers ───────────────────────────────────────────────────────────
function battingTable(players, showYear) {
  var sorted = applySort(players, batSort, 'bat');
  var cols = showYear
    ? [BAT_COLS[0], { key: 'years', label: 'Yrs', noSort: true }].concat(BAT_COLS.slice(1))
    : BAT_COLS;

  var h = '<table><thead><tr>';
  cols.forEach(function(c) {
    var active = !c.noSort && batSort.col === c.key ? ' sort-active' : '';
    var sortable = c.noSort ? '' : ' sortable';
    var click = c.noSort ? '' : ' onclick="sortOn(\'bat\',\'' + c.key + '\')"';
    var thCls = (c.cls === 'pcol' ? ' pcol' : '') + active + sortable;
    h += '<th class="' + thCls.trim() + '"' + click + '>'
      + c.label + (c.noSort ? '' : sortIcon(batSort, c.key)) + '</th>';
  });
  h += '</tr></thead><tbody>';

  if (sorted.length) {
    sorted.forEach(function(p, i) {
      h += '<tr>';
      cols.forEach(function(c) {
        var tdCls = c.cls || '';
        if (c.key === 'name') {
          h += '<td class="pcol">' + (i+1) + '. ' + p.name + '</td>';
        } else if (c.key === 'years') {
          h += '<td>' + (p.years || []).map(function(y) {
            return '<span class="year-badge y'+y+'">'+y+'</span>';
          }).join('') + '</td>';
        } else if (c.key === 'highestNum') {
          h += '<td>' + (p.highest || '-') + '</td>';
        } else if (c.fmt) {
          h += '<td' + (tdCls ? ' class="'+tdCls+'"' : '') + '>' + c.fmt(p[c.key]) + '</td>';
        } else {
          h += '<td' + (tdCls ? ' class="'+tdCls+'"' : '') + '>' + (p[c.key] != null ? p[c.key] : '-') + '</td>';
        }
      });
      h += '</tr>';
    });
  } else {
    h += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#9CA3AF;padding:20px">No batting data available</td></tr>';
  }
  return h + '</tbody></table>';
}

function bowlingTable(players, showYear) {
  var sorted = applySort(players, bowlSort, 'bowl');
  var cols = showYear
    ? [BOWL_COLS[0], { key: 'years', label: 'Yrs', noSort: true }].concat(BOWL_COLS.slice(1))
    : BOWL_COLS;

  var h = '<table><thead><tr>';
  cols.forEach(function(c) {
    var active = !c.noSort && bowlSort.col === c.key ? ' sort-active' : '';
    var sortable = c.noSort ? '' : ' sortable';
    var click = c.noSort ? '' : ' onclick="sortOn(\'bowl\',\'' + c.key + '\')"';
    var thCls = (c.cls === 'pcol' ? ' pcol' : '') + active + sortable;
    h += '<th class="' + thCls.trim() + '"' + click + '>'
      + c.label + (c.noSort ? '' : sortIcon(bowlSort, c.key)) + '</th>';
  });
  h += '</tr></thead><tbody>';

  if (sorted.length) {
    sorted.forEach(function(p, i) {
      h += '<tr>';
      cols.forEach(function(c) {
        var tdCls = c.cls || '';
        if (c.key === 'name') {
          h += '<td class="pcol">' + (i+1) + '. ' + p.name + '</td>';
        } else if (c.key === 'years') {
          h += '<td>' + (p.years || []).map(function(y) {
            return '<span class="year-badge y'+y+'">'+y+'</span>';
          }).join('') + '</td>';
        } else if (c.key === 'oversFloat') {
          h += '<td>' + p.overs + '</td>';
        } else if (c.key === 'bestSort') {
          h += '<td>' + (p.bestFigures || '-') + '</td>';
        } else if (c.fmt) {
          h += '<td' + (tdCls ? ' class="'+tdCls+'"' : '') + '>' + c.fmt(p[c.key]) + '</td>';
        } else {
          h += '<td' + (tdCls ? ' class="'+tdCls+'"' : '') + '>' + (p[c.key] != null ? p[c.key] : '-') + '</td>';
        }
      });
      h += '</tr>';
    });
  } else {
    h += '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#9CA3AF;padding:20px">No bowling data available</td></tr>';
  }
  return h + '</tbody></table>';
}

// ── main render ───────────────────────────────────────────────────────────────
function render() {
  var tigers = function(p) { return p.team && p.team.includes('Tigers'); };
  var d2025 = LEATHER_STATS.t20_2025 || {};
  var d2024 = LEATHER_STATS.t20_2024 || {};

  var bat, bowl, showYear;
  if (activeYear === '2025') {
    bat  = enrichBatting((d2025.batting  || []).filter(tigers));
    bowl = enrichBowling((d2025.bowling  || []).filter(tigers));
    showYear = false;
  } else if (activeYear === '2024') {
    bat  = enrichBatting((d2024.batting  || []).filter(tigers));
    bowl = enrichBowling((d2024.bowling  || []).filter(tigers));
    showYear = false;
  } else {
    bat  = aggregateBatting((d2024.batting || []).filter(tigers), (d2025.batting || []).filter(tigers));
    bowl = aggregateBowling((d2024.bowling || []).filter(tigers), (d2025.bowling || []).filter(tigers));
    showYear = true;
  }

  document.getElementById('battingWrap').innerHTML = battingTable(bat, showYear);
  document.getElementById('bowlingWrap').innerHTML = bowlingTable(bowl, showYear);
}

window.addEventListener('DOMContentLoaded', function() {
  if (typeof LEATHER_STATS === 'undefined') {
    document.getElementById('statsNote').style.display = 'block';
    document.getElementById('battingWrap').style.display = 'none';
    document.getElementById('bowlingWrap').style.display = 'none';
    return;
  }
  render();
});
</script>
</body>
</html>
